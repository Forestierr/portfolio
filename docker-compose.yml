services:
  portfolio:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-user}/${GITHUB_REPOSITORY_NAME:-portfolio}:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: always
